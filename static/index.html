<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fridge AI | Modern Recipe Generator</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="app-container">
        <header class="glass-card header">
            <div class="logo-area">
                <i data-lucide="utensils" class="logo-icon"></i>
                <h1>Fridge<span>AI</span></h1>
            </div>
            <p>Your strict culinary assistant. Zero waste, infinite taste.</p>
        </header>

        <section class="glass-card search-section">
            <div class="input-group">
                <label for="ingredients">What's in your fridge?</label>
                <div class="textarea-wrapper">
                    <textarea id="ingredients" placeholder="e.g. Tomato, Cheese, Bread, Eggs..."></textarea>
                    <div class="input-hint">Separate ingredients with commas</div>
                </div>
                <div class="checkbox-wrapper" style="margin-top: 10px; display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="allow-spices" checked>
                    <label for="allow-spices" style="margin: 0; font-size: 0.9em; font-weight: normal; cursor: pointer; color: var(--text-color);">Allow common spices and cooking oils (salt, pepper, oil, etc.)</label>
                </div>
            </div>
            <div class="input-row" style="display: flex; gap: 15px; margin-top: 15px;">
                <div class="input-group" style="flex: 1; margin-top: 0;">
                    <label for="nationality">Cuisine Type</label>
                    <select id="nationality" class="provider-select">
                        <option value="Any" selected>Any / Global</option>
                        <option value="Italian">Italian</option>
                        <option value="Mexican">Mexican</option>
                        <option value="Indian">Indian</option>
                        <option value="American">American</option>
                        <option value="Chinese">Chinese</option>
                        <option value="Japanese">Japanese</option>
                        <option value="French">French</option>
                        <option value="Mediterranean">Mediterranean</option>
                    </select>
                </div>
                <div class="input-group" style="flex: 1; margin-top: 0;">
                    <label for="provider">Choose AI Model</label>
                    <select id="provider" class="provider-select">
                        <optgroup label="OpenAI Models">
                            <option value="openai:gpt-4o">GPT-4o (Most Capable)</option>
                            <option value="openai:gpt-4o-mini" selected>GPT-4o-Mini (Fast & Cheap)</option>
                            <option value="openai:gpt-3.5-turbo">GPT-3.5 Turbo (Legacy)</option>
                        </optgroup>
                        <optgroup label="Groq Models">
                            <option value="groq:llama-3.3-70b-versatile">LLaMA-3.3 70B (Versatile)</option>
                            <option value="groq:mixtral-8x7b-32768">Mixtral 8x7B (Fast)</option>
                            <option value="groq:gemma2-9b-it">Gemma 2 9B (Lightweight)</option>
                        </optgroup>
                    </select>
                </div>
            </div>
            <button id="generate-btn" class="primary-btn">
                <span class="btn-text">Generate Recipe</span>
                <i data-lucide="chef-hat" class="btn-icon"></i>
                <div class="loader-ring"></div>
            </button>
        </section>

        <section id="result-section" class="result-section hidden">
            <!-- Content will be injected by script.js -->
        </section>
    </main>

    <script src="/static/script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
